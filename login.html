<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen mx-auto bg-base-200"">
    
    <section class="mx-auto text-center py-4 w-[400px] pt-27">
        <img  class="mx-auto max-w-full" src="./assets/github-logo.png" alt="">
        <h2 class="text-2xl font-bold ">GitHub Issues Tracker</h2>
        <h3 class="text-xl text-gray-500 pb-5">Sign in to manage your issues</h3>

              <div class="w-full max-w-sm shadow-2xl card bg-base-100 shrink-0">
        <div class="card-body pt-30">

  <legend class="fieldset-legend">User Name</legend>

  <input maxlength="5" minlength="4" id="input-name" type="email" class="input" placeholder="enter your name" />

  <label class="label">Password</label>
  <input maxlength="8" minlength="8" id="input-password" type="password" class="input" placeholder="Password" />

  <button id="sign-btn" class="btn btn-primary mt-4">sign in</button>
</fieldset>
        </section>


    </section>
    
    <script src="./login.js"></script>
</body>
</html>
